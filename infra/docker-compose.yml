services:
  postgres:
    image: postgres:16-alpine
    container_name: obsidian-sync-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-obsidian_sync}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT_BIND:-5432:5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-obsidian_sync}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: obsidian-sync-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT_BIND:-9000:9000}"
      - "${MINIO_CONSOLE_PORT_BIND:-9001:9001}"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
